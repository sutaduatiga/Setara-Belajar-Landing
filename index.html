<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Setara Belajar — Cukup Mengajar!</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Figtree:wght@300;400;600;700;900&family=League+Spartan:wght@700;900&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      font-family: "Figtree", ui-sans-serif, system-ui, sans-serif;
      background: #ffffff;
      color: #1e293b;
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
    }

    .page {
      min-height: 100vh;
      background: #ffffff;
      display: flex;
      flex-direction: column;
      position: relative;
      overflow-x: hidden;
    }

    .grid-bg {
      position: absolute;
      top: 0; left: 0;
      width: 400px; height: 400px;
      background-image:
        linear-gradient(to right, #e5e7eb 1px, transparent 1px),
        linear-gradient(to bottom, #e5e7eb 1px, transparent 1px);
      background-size: 40px 40px;
      -webkit-mask-image: linear-gradient(to bottom right, rgba(0,0,0,1) 30%, rgba(0,0,0,0) 80%);
      mask-image: linear-gradient(to bottom right, rgba(0,0,0,1) 30%, rgba(0,0,0,0) 80%);
      z-index: 0;
      pointer-events: none;
    }

    .landing {
      position: relative;
      z-index: 1;
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: 2rem;
    }
    @media (min-width: 768px) { .landing { padding: 4rem; } }

    nav { 
      display: flex; 
      justify-content: space-between; 
      align-items: center;
      width: 100%;
    }
    
    .logo-container svg {
      height: 65px; 
      width: auto;
      display: block;
    }

    nav button {
      font-family: inherit;
      font-size: 0.875rem;
      font-weight: 500;
      color: #6b7280;
      background: none;
      border: none;
      cursor: pointer;
      transition: color 0.15s;
    }
    nav button:hover { color: #000; }

    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      max-width: 56rem;
      margin: 0 auto;
      padding: 3rem 0;
      width: 100%;
    }

    h1 {
      font-size: clamp(2.8rem, 10vw, 4.5rem);
      font-weight: 700;
      letter-spacing: -0.025em;
      color: #1e293b;
      margin-bottom: 1rem;
      line-height: 1.1;
    }

    .subtitle {
      font-size: clamp(1rem, 2.5vw, 1.2rem);
      color: #4b5563;
      margin-bottom: 2.5rem;
    }

    .cta-link {
      display: inline-block;
      background: #0d9488;
      color: #fff;
      text-decoration: none;
      padding: 1rem 2rem;
      border-radius: 0.75rem;
      box-shadow: 0 10px 20px -4px rgba(13,148,136,0.25);
      text-align: center;
      transition: background 0.15s, transform 0.15s;
    }
    .cta-link:hover { background: #0f766e; transform: translateY(-2px); }
    .cta-link:active { transform: translateY(0); }
    .cta-main { display: block; font-size: 1rem; font-weight: 600; }
    .cta-sub  { display: block; font-size: 0.625rem; opacity: 0.8; font-weight: 300; margin-top: 0.2rem; }

    .footer-wrap { width: 100%; display: flex; flex-direction: column; gap: 1.5rem; }
    footer { max-width: 72rem; margin: 0 auto; width: 100%; }
    .footer-inner { border-top: 1px solid #f3f4f6; padding-top: 1.8rem; }
    .footer-label {
      font-size: 0.7rem; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.1em; color: #9ca3af; margin-bottom: 1rem;
    }
    .footer-links {
      display: flex; flex-direction: row;
      align-items: center; justify-content: space-between;
      width: 100%; gap: 1rem;
      overflow-x: auto; padding-bottom: 0.5rem;
      scrollbar-width: none; -ms-overflow-style: none;
    }
    .footer-links::-webkit-scrollbar { display: none; }
    .footer-links button {
      font-family: inherit; font-size: 0.6875rem;
      color: #6b7280; background: none; border: none;
      cursor: pointer; white-space: nowrap; padding: 0;
      transition: color 0.15s;
    }
    @media (min-width: 768px) { .footer-links button { font-size: 0.875rem; } }
    .footer-links button:hover { color: #000; text-decoration: underline; }

    .feedback-wrap { display: flex; justify-content: center; padding-bottom: 0.5rem; }
    .feedback-btn {
      font-family: inherit; font-size: 0.6rem; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.2em;
      color: #9ca3af; background: none; border: none; cursor: pointer;
      transition: color 0.15s;
      text-decoration: none;
    }
    .feedback-btn:hover { color: #0d9488; }

    .coming-soon {
      display: none;
      position: fixed; inset: 0;
      background: #ffffff;
      z-index: 100;
      align-items: center;
      justify-content: center;
      flex-direction: column;
    }
    .coming-soon.active { display: flex; }

    .back-btn {
      position: absolute; top: 2rem; left: 2rem;
      font-family: inherit; font-size: 0.875rem;
      color: #6b7280; background: none; border: none;
      cursor: pointer; transition: color 0.15s;
    }
    .back-btn:hover { color: #000; }

    .typewriter-wrap {
      display: flex;
      align-items: center;
      font-size: clamp(1.875rem, 8vw, 3rem);
      font-weight: 700;
      color: #1e293b;
      white-space: nowrap;
    }

    .cursor-bar {
      display: inline-block;
      width: 3px;
      height: 1em;
      background: #1e293b;
      margin-left: 4px;
      vertical-align: text-bottom;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50%        { opacity: 0; }
    }
  </style>
</head>
<body>

<div class="page">
  <div class="grid-bg"></div>

  <div class="landing">
    <nav>
      <div class="logo-container">
        <svg width="240" height="80" viewBox="0 0 240 80" xmlns="http://www.w3.org/2000/svg">
          <text x="0" y="35" font-family="'League Spartan', sans-serif" font-weight="900" font-size="34" fill="#3D4A5E">setara</text>
          <text x="0" y="72" font-family="'League Spartan', sans-serif" font-weight="900" font-size="34" fill="#3D4A5E">belajar</text>
          
          <rect x="110" y="5" width="55" height="18" rx="4" fill="#0D9488" />
          <rect x="120" y="28" width="45" height="18" rx="4" fill="#FACC15" />
        </svg>
      </div>
      <button onclick="alert('Fitur riwayat akan segera hadir!')">Dokumen Saya</button>
    </nav>

    <main>
      <h1>Cukup Mengajar</h1>
      <p class="subtitle">Biar kami yang menyelesaikan tugas administrasi Anda.</p>
      <a href="https://setara-belajar-separate-db.pages.dev/" class="cta-link">
        <span class="cta-main">Mulai buat modul ajar</span>
        <span class="cta-sub">Disesuaikan dengan kurikulum yang berlaku</span>
      </a>
    </main>

    <div class="footer-wrap">
      <footer>
        <div class="footer-inner">
          <p class="footer-label">Alat lainnya - Segera hadir</p>
          <div class="footer-links">
            <button onclick="showComingSoon()">Pembuat Materi</button>
            <button onclick="showComingSoon()">Pembuat Rubrik Penilaian</button>
            <button onclick="showComingSoon()">Pelacak Kemajuan Siswa</button>
            <button onclick="showComingSoon()">Log Komunikasi Orang Tua</button>
            <button onclick="showComingSoon()">Akreditasi</button>
          </div>
        </div>
      </footer>
      <div class="feedback-wrap">
         <a href="https://forms.gle/9YR8ebEK7LCqeDxV6" target="_blank" rel="noopener noreferrer" class="feedback-btn">
            Berikan Masukan
        </a>
      </div>
    </div>
  </div>

  <div class="coming-soon" id="comingSoon">
    <button class="back-btn" onclick="hideComingSoon()">← Kembali</button>
    <div class="typewriter-wrap">
      <span id="typingText"></span><span class="cursor-bar" id="cursorBar"></span>
    </div>
  </div>
</div>

<script>
  var typingInterval = null;

  function showComingSoon() {
    document.getElementById('comingSoon').classList.add('active');
    startTypewriter();
  }

  function hideComingSoon() {
    document.getElementById('comingSoon').classList.remove('active');
    if (typingInterval) { clearInterval(typingInterval); typingInterval = null; }
    document.getElementById('typingText').textContent = '';
    var cur = document.getElementById('cursorBar');
    cur.style.animation = '';
    cur.style.opacity = '1';
  }

  function startTypewriter() {
    var el  = document.getElementById('typingText');
    var cur = document.getElementById('cursorBar');
    var text = 'Sedang dibuat...';
    var i = 0;
    el.textContent = '';
    cur.style.animation = 'blink 0.8s step-end infinite';

    if (typingInterval) clearInterval(typingInterval);

    typingInterval = setInterval(function () {
      el.textContent += text.charAt(i);
      i++;
      if (i >= text.length) {
        clearInterval(typingInterval);
        typingInterval = null;
        setTimeout(function () {
          cur.style.animation = 'none';
          cur.style.opacity = '0';
        }, 600);
      }
    }, 80);
  }
</script>

</body>
</html>
